# Mosquitto MQTT broker configuration for BOLT development
#
# Allows anonymous connections on plain MQTT (1883) and WebSocket (9001).
# Do NOT use this config in a production or internet-facing deployment
# without adding authentication (password_file / tls_cafile).

# ── Plain MQTT listener ───────────────────────────────────────────────
listener 1883
allow_anonymous true

# ── WebSocket listener (optional, useful for browser tooling) ─────────
listener 9001
protocol websockets
allow_anonymous true

# ── Persistence ───────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
